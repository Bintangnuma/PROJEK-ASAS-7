<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Animated Login Page</title>

    <style>
        @import url('https://fonts.googleapis.com/css?family=Open+Sans:400,600,700&display=swap');
        
        *{
            margin:0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Open Sans', sans-serif;        
        }

        body{
            min-height: 100vh;
            background: rgb(13, 13, 13);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .back{
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 8px 5px;
            width: 120px;
            height: 40px;
            text-align: center;
            background-color: #b71b15;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            transition: 0.3s;
        }

        .back:hover{
            transform: scale(1.05);
        }

        .square{
            position:relative;
            width:500px;
            height:500px;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .square i{
            position:absolute;
            inset:0;
            border:2px solid white;
            transition:0.5s;
        }

        .square i:nth-child(1){
            border-radius:38% 62% 63% 37% / 41% 44% 56% 59%;
            animation: animate 6s linear infinite;
        }

        .square i:nth-child(2){
            border-radius:41% 44% 56% 59% / 38% 62% 63% 37%;
            animation: animate 4s linear infinite;
        }

        .square i:nth-child(3){
            border-radius:41% 44% 56% 59% / 38% 62% 63% 37%;
            animation: animate2 10s linear infinite;
        }

        .square:hover i{
            border:2px solid var(--clr);
            border-width:6px;
            filter: drop-shadow(0 0 20px var(--clr));
        }

        @keyframes animate{
            0%{ transform: rotate(0deg); }
            100%{ transform: rotate(360deg); }
        }

        @keyframes animate2{
            0%{ transform: rotate(360deg); }
            100%{ transform: rotate(0deg); }
        }

        .login{
            position:absolute;
            width:300px;
            height:100%;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 20px;
        }

        .login h2{
            font-size: 2em;
            color:#fff;
        }

        .login .input8x{
            position: relative;
            width: 100%;
        }

        .login .input8x input{
            width: 100%;
            padding: 12px 20px;
            background:transparent;
            border: 2px solid #fff;
            border-radius: 40px;
            font-size: 1.2em;
            color: #fff;
            outline: none;
        }

        .login .input8x input[type="submit"]{
            width:100%;
            background: linear-gradient(45deg, #ea660e,#fff172);
            border: none;
            cursor: pointer;
            color: #000;
            font-weight: bold;
            transition: 0.3s;
        }

        .login .input8x input[type="submit"]:hover{
            transform: scale(1.05);
        }

        .login .input8x input[type="submit"]:active{
            transform: scale(0.95);
        }

        .login .input8x input::placeholder{
            color: rgba(255,255,255,0.75);
        }

        .login .links{
            width:100%;
            display:flex;
            justify-content: space-between;
            padding: 0 20px;
        }

        .login .links a{
            color: #fff; 
            text-decoration: none;
        }
    </style>
</head>

<body>

    <a href="index.html" class="back">Back</a>

    <div class="square">
        <i style="--clr:#ff5500;"></i>
        <i style="--clr:#fffd44;"></i>
        <i style="--clr:#f41414;"></i>

        <div class="login">
            <h2>Login</h2>

            <div class="input8x">
                <input type="text" placeholder="Username">
            </div>

            <div class="input8x">
                <input type="password" placeholder="Password">
            </div>

            <div class="input8x">
                <input type="submit" value="Sign in">
            </div>

            <div class="links">
                <a href="#">Forgot Password</a>
                <a href="#">Sign up</a>
            </div>
        </div>
    </div>

    <audio autoplay loop muted id="music" style="background: white;">
        <source src="assets/agerabeatz-space-199701.mp3" type="audio/mpeg">
    </audio>

    <script>
    document.addEventListener("click", function() {
        const music = document.getElementById("music");
        music.muted = false;
        music.play();
    });


    const music = document.getElementById("music");
    music.volume = 0.2;
    </script>
</body>
</html>
